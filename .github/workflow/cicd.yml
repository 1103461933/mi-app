name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: 'xlen911'  # ✅ Directamente, sin secretos
  DOCKER_IMAGE_NAME: 'mi-app'
  GIT_REPO_INFRA: 'https://github.com/xlen911/mi-app-infra.git'
  HELM_VALUES_PATH: 'helm/mi-app/values.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  # ✅ Este SÍ es secreto

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Update Helm values in infra repo
        env:
          GH_PAT: ${{ secrets.INFRA_GIT_PAT }}  # ✅ Este SÍ es secreto
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/xlen911/mi-app-infra.git
          cd mi-app-infra
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" ${{ env.HELM_VALUES_PATH }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push